# ================================================================
#  compose.apps.yml — Application Layer
#  App: PocketBase (BaaS) + Litestream (SQLite → S3 replication)
#
#  Subdomain: ${PROJECT_NAME}.${DOMAIN}
#
#  Minimal required env:
#    APP_PORT, PROJECT_NAME, DOMAIN
#    LITESTREAM_S3_ENDPOINT, LITESTREAM_S3_BUCKET,
#    LITESTREAM_S3_ACCESS_KEY_ID, LITESTREAM_S3_SECRET_ACCESS_KEY
#
#  Startup behavior:
#    - Normal: restore data.db từ S3 trước → exit 1 nếu không có backup
#    - Init:   LITESTREAM_INIT_MODE=true → bỏ qua restore, tạo DB mới
#              Truy cập /_/ để setup admin → dừng → tắt INIT_MODE
#
#  PocketBase URLs:
#    Admin UI  : http(s)://<domain>/_/
#    API       : http(s)://<domain>/api/
#    Health    : http(s)://<domain>/api/health
# ================================================================

services:
  app:
    image: "${PROJECT_NAME:-myapp}-app:local"
    build:
      context: ./services/app
      dockerfile: Dockerfile
      args:
        PB_VERSION: "${PB_VERSION:-0.28.2}"
    environment:
      # ── PocketBase runtime ──────────────────────────────────────
      DATA_DIR: "/pb/pb_data"
      NODE_ENV: "${NODE_ENV:-production}"

      # ── Litestream / S3 ─────────────────────────────────────────
      # Init mode: true  = bỏ qua restore, tạo data mới (lần đầu tiên)
      #            false = bắt buộc restore từ S3, exit 1 nếu không có
      LITESTREAM_INIT_MODE: "${LITESTREAM_INIT_MODE:-false}"
      LITESTREAM_S3_ENDPOINT: "${LITESTREAM_S3_ENDPOINT}"
      LITESTREAM_S3_BUCKET: "${LITESTREAM_S3_BUCKET}"
      LITESTREAM_S3_PATH: "${LITESTREAM_S3_PATH:-pocketbase/data.db}"
      LITESTREAM_S3_ACCESS_KEY_ID: "${LITESTREAM_S3_ACCESS_KEY_ID}"
      LITESTREAM_S3_SECRET_ACCESS_KEY: "${LITESTREAM_S3_SECRET_ACCESS_KEY}"

    command:
      - "./pocketbase"
      - "serve"
      - "--http=0.0.0.0:${APP_PORT:-8090}"
      - "--dir=/pb/pb_data"

    ports:
      - "127.0.0.1:${APP_HOST_PORT:-8090}:${APP_PORT:-8090}"

    volumes:
      # pb_data chứa data.db, logs.db, storage (file uploads), migrations
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/app/pb_data:/pb/pb_data

    labels:
      # Public HTTP via Cloudflare Tunnel
      - "caddy=http://${PROJECT_NAME}.${DOMAIN}, http://main.${DOMAIN}, http://${DOMAIN}, http://${PROJECT_NAME}.${TAILSCALE_TAILNET_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams ${APP_PORT:-8090}}}"
      # Internal HTTPS via Tailscale
      - "caddy_1=https://${PROJECT_NAME:-myapp}.${TAILSCALE_TAILNET_DOMAIN:-tailnet.local}"
      - "caddy_1.tls=internal"
      - "caddy_1.reverse_proxy={{upstreams ${APP_PORT:-8090}}}"

    networks: [app_net]
    restart: unless-stopped

    # Litestream cần ~30-40s để flush WAL cuối cùng lên S3 trước khi tắt
    stop_grace_period: 40s

    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "wget -qO- http://localhost:${APP_PORT:-8090}/api/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
